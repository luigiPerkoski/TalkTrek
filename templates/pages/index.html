{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">

</head>

<body>
    <div class="d-flex">
        <div class="chat-rooms h-100 w-25">
            <div class="rooms m-3">
                <div class="d-flex justify-content-between">
                    <h3>chat<span class="text-primary">us</span></h3>
                    <button class="btn btn-transparent mb-2"><i class="bi bi-plus-circle-fill text-primary"></i></button>
                </div>
                <ul class="list-group shadow border-0">
                    {% for room in rooms %}
                        <li class="list-group-item active">{{room.title}}</li> <!--Rooms-->
                    {% endfor %}
                </ul>
            </div>
        </div>
        <div class="chat-messages h-100 w-75">
            <div class="messages card m-3 p-3 h-75 shadow border-0 overflow-scroll">
                <ul class="list-group list-group-flush">
                    {% for message in messages %}
                        <li class="list-group-item border-bottom-0">
                            <div class="d-flex justify-content-between">
                                
                                <div class="content">
                                    <b>{{message.user}}</b> {{message.text}}
                                </div>
                                <div class="time ">{{message.created_at}}</div> <!--TODO: fazer estrutura de repetição para alterar a formatação do tempo de acordo com o dia  -->
                                
                            </div>
                        </li>
                    {% endfor %}
                </ul>
            </div>
            <div class="send-message card m-3 shadow border-0">
                <form>
                    <input type="text" class="form-control border-1 fs-5" placeholder="Escreva uma mensagem">
                </form>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous">
    </script>
</body>

</html>
